<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F4F5F7;font-family:'Open Sans',sans-serif;font-size:14px;color:#1a1a2e;min-height:100vh}
h1,h2,h3,.num{font-family:'Montserrat',sans-serif;font-weight:700}
:root{
  --navy:#0F2040;--navy2:#1A3560;--gold:#B8860B;--gold-lt:#FDF6E3;--gold-bd:#D4A017;
  --active:#1D6FA4;--active-lt:#E6F2FB;
  --closed:#1B6B3A;--closed-lt:#E8F5EE;
  --pending:#8B4513;--pending-lt:#FDF0E6;
  --blocked:#8B1A1A;--blocked-lt:#FDEAEA;
  --inactive:#4A4A6A;--inactive-lt:#F0F0F6;
  --high:#B91C1C;--med:#B45309;--low:#374151;
  --case:#185FA5;--initiative:#0F6E56;--feedback:#534AB7;--training:#854F0B;
}

.app{max-width:1120px;margin:0 auto;padding:0 0 48px}

.header{background:var(--navy);color:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold-bd)}
.header-left h1{font-size:19px;letter-spacing:.6px;color:#fff}
.header-left .sub{font-size:11px;color:#94A3B8;margin-top:3px;font-family:'Open Sans',sans-serif;font-weight:400;letter-spacing:.3px;text-transform:uppercase}
.badge-shield{background:var(--gold-bd);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:3px;letter-spacing:.5px;font-family:'Open Sans',sans-serif}

.tabs{display:flex;gap:0;border-bottom:1px solid #D1D5DB;background:#fff;padding:0 32px;overflow-x:auto}
.tab{padding:13px 22px;cursor:pointer;font-weight:600;font-size:13px;color:#6B7280;border-bottom:3px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .18s;font-family:'Open Sans',sans-serif}
.tab.active{color:var(--navy);border-bottom-color:var(--gold-bd)}
.tab:hover:not(.active){color:#374151;background:#F9FAFB}

.content{padding:28px 32px}

.card{background:#fff;border-radius:8px;border:1px solid #E2E8F0;padding:20px 24px}
.card.lb{border-left:4px solid var(--navy2);border-radius:0 8px 8px 0}
.card.lb-gold{border-left:4px solid var(--gold-bd);border-radius:0 8px 8px 0}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:24px}
.stat{background:#fff;border-radius:8px;border:1px solid #E2E8F0;border-top:3px solid var(--navy2);padding:16px 18px}
.stat.gold{border-top-color:var(--gold-bd)}
.stat.green{border-top-color:#1B6B3A}
.stat.red{border-top-color:#B91C1C}
.stat.purple{border-top-color:#534AB7}
.stat .lbl{font-size:11px;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat .num{font-size:26px;color:var(--navy)}
.stat.gold .num{color:var(--gold)}
.stat.green .num{color:#1B6B3A}
.stat.red .num{color:#B91C1C}
.stat.purple .num{color:#534AB7}

.badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap}
.b-active{background:var(--active-lt);color:var(--active)}
.b-closed{background:var(--closed-lt);color:var(--closed)}
.b-pending{background:var(--pending-lt);color:var(--pending)}
.b-blocked{background:var(--blocked-lt);color:var(--blocked)}
.b-inactive{background:var(--inactive-lt);color:var(--inactive)}
.b-case{background:#E6F2FB;color:#0C447C}
.b-initiative{background:#E1F5EE;color:#085041}
.b-feedback{background:#EEEDFE;color:#3C3489}
.b-training{background:#FAEEDA;color:#633806}
.b-high{background:#FEE2E2;color:#991B1B}
.b-med{background:#FEF3C7;color:#92400E}
.b-low{background:#F3F4F6;color:#374151}
.b-lead{background:#0F2040;color:#E2E8F0}
.b-support{background:#E2E8F0;color:#1E293B}

.alert{background:#FFFBEB;border:1px solid #FCD34D;border-left:4px solid #D97706;border-radius:0 6px 6px 0;padding:11px 15px;margin-bottom:18px;display:flex;align-items:center;gap:9px;font-size:12px;color:#78350F}

.prog-wrap{margin-bottom:12px}
.prog-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:#374151}
.prog-track{height:7px;background:#E5E7EB;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px}

table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead tr{background:var(--navy);color:#fff}
thead th{padding:11px 13px;text-align:left;font-weight:600;font-family:'Open Sans',sans-serif;font-size:11px;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden}
tbody tr{border-bottom:1px solid #F1F5F9;cursor:pointer;transition:background .13s}
tbody tr:hover{background:#F8FAFC}
tbody td{padding:10px 13px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis}
.tw{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tname{font-weight:600;color:#1E293B;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tsub{font-size:11px;color:#64748B;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.table-wrap{border-radius:8px;border:1px solid #E2E8F0;overflow:hidden;overflow-x:auto}

.sec-hdr{background:#1E293B;color:#E2E8F0;padding:9px 15px;font-weight:700;font-family:'Montserrat',sans-serif;font-size:12px;letter-spacing:.4px}

.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-row select,.filter-row input{padding:7px 11px;border:1px solid #D1D5DB;border-radius:6px;font-family:'Open Sans',sans-serif;font-size:12px;color:#374151;background:#fff;outline:none}
.filter-row select:focus{border-color:var(--navy2)}
.btn{padding:7px 16px;border-radius:6px;font-weight:600;font-family:'Open Sans',sans-serif;font-size:12px;cursor:pointer;border:none;transition:all .13s}
.btn-primary{background:var(--navy2);color:#fff}
.btn-primary:hover{background:var(--navy)}
.btn-danger{background:#B91C1C;color:#fff}
.btn-ghost{background:#F1F5F9;color:#374151;border:1px solid #D1D5DB}
.btn-ghost:hover{background:#E2E8F0}

.review-grid{display:grid;grid-template-columns:1fr;gap:14px}
.review-card{background:#1E293B;color:#CBD5E1;border-radius:8px;padding:20px 22px}
.review-card .rc-title{font-family:'Montserrat',sans-serif;font-size:15px;color:#F1F5F9;margin-bottom:5px}
.review-card .rc-impact{font-size:13px;color:#94A3B8;line-height:1.65;margin-bottom:11px}
.review-card .rc-quote{background:#0F172A;border-left:3px solid var(--gold-bd);padding:9px 13px;border-radius:3px;font-size:12px;color:#94A3B8;font-style:italic;margin-bottom:12px}
.rc-tags{display:flex;flex-wrap:wrap;gap:6px}
.rc-tag{background:#334155;color:#94A3B8;font-size:11px;padding:2px 9px;border-radius:999px}
.rc-warn{background:#FFFBEB;color:#78350F;border:1px solid #FCD34D;padding:9px 13px;border-radius:5px;font-size:12px;cursor:pointer;margin-top:9px}

.overlay{position:absolute;inset:0;background:rgba(15,32,64,.52);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:24px 12px}
.modal{background:#fff;border-radius:10px;width:100%;max-width:700px;overflow:hidden;margin:auto}
.modal-hdr{background:var(--navy);color:#fff;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--gold-bd)}
.modal-hdr h2{font-size:15px;color:#fff}
.modal-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1}
.modal-body{padding:22px;max-height:65vh;overflow-y:auto}
.modal-ftr{padding:13px 22px;border-top:1px solid #E2E8F0;display:flex;justify-content:space-between;align-items:center;background:#F8FAFC}

.fs{border:none;margin-bottom:16px}
.fs legend{font-weight:700;font-family:'Montserrat',sans-serif;font-size:11px;color:var(--navy2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid #EEF2FF;display:block;width:100%}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.frow.s1{grid-template-columns:1fr}
.frow.s3{grid-template-columns:1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:11px;font-weight:600;color:#374151}
.fg input,.fg select,.fg textarea{padding:7px 9px;border:1px solid #D1D5DB;border-radius:5px;font-family:'Open Sans',sans-serif;font-size:12px;color:#1E293B;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--navy2)}
.fg textarea{resize:vertical;min-height:66px}
.imp-note{font-size:11px;color:#B91C1C;font-weight:600;margin-top:2px}
.sk-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:3px}
.sk-btn{padding:4px 11px;border-radius:999px;font-size:11px;cursor:pointer;border:1.5px solid #D1D5DB;background:#fff;color:#374151;transition:all .13s;font-family:'Open Sans',sans-serif}
.sk-btn.active{border-color:var(--navy2);background:#EEF2FF;color:var(--navy2);font-weight:600}

.outcome-badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.3px;margin-right:4px}
.ob-conviction{background:#1B6B3A;color:#E8F5EE}
.ob-arrest{background:#185FA5;color:#E6F2FB}
.ob-seizure{background:#854F0B;color:#FAEEDA}
.ob-indictment{background:#534AB7;color:#EEEDFE}
.ob-none{background:#4A4A6A;color:#F0F0F6}

#modal-wrap{position:relative;min-height:1px}
</style>
</head>
<body>
<div class="app" id="modal-wrap">
<div class="header">
  <div class="header-left">
    <h1>SA Performance &amp; Case Tracker</h1>
  </div>
  <span class="badge-shield">SPECIAL AGENT</span>
</div>

<div class="tabs" id="tabs-bar">
  <div class="tab active" onclick="showTab('overview')">Overview</div>
  <div class="tab" onclick="showTab('cases')">Case Log</div>
  <div class="tab" onclick="showTab('initiatives')">Initiatives &amp; Duties</div>
  <div class="tab" onclick="showTab('feedback')">Feedback &amp; Awards</div>
  <div class="tab" onclick="showTab('review')">Review Doc</div>
</div>

<div id="tab-overview" class="content"></div>
<div id="tab-cases" class="content" style="display:none"></div>
<div id="tab-initiatives" class="content" style="display:none"></div>
<div id="tab-feedback" class="content" style="display:none"></div>
<div id="tab-review" class="content" style="display:none"></div>

<div class="overlay" id="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
<div class="modal">
  <div class="modal-hdr"><h2 id="modal-title">Add Entry</h2><button class="modal-close" onclick="closeModal()">×</button></div>
  <div class="modal-body" id="modal-body"></div>
  <div class="modal-ftr" id="modal-ftr"></div>
</div>
</div>
</div>

<script>
const COMPETENCIES=['Investigation','Legal/Court','Written Communication','Verbal Briefing','Leadership','Surveillance','Source Development','Intelligence Analysis','Interagency Coordination','Digital/Cyber','Financial Analysis','Evidence Collection'];
const CASE_STATUS=['Active','Closed — Conviction','Closed — Declined','Pending Review','Inactive'];
const CASE_PRIORITY=['High','Medium','Low'];
const VIOLATION_TYPES=['Public Corruption','Organized Crime','Financial Fraud/Wire','Cybercrime','Drug Trafficking','Human Trafficking','Civil Rights','Counterterrorism','Health Care Fraud','Money Laundering','Other'];
const OUTCOMES=['Arrest','Indictment','Conviction','Asset Seizure','Declined','Pending','Other'];
const INIT_TYPES=['Office Initiative','Training Delivery','Task Force Participation','Community Outreach','Policy/Procedure','Recruiting','Collateral Duty','Other'];
const INIT_STATUS=['Active','Completed','Ongoing'];
const FEEDBACK_TYPES=['Supervisor Commendation','Peer Recognition','AUSA Feedback','Task Force Partner','Written Award','Verbal Commendation','Annual Review Note','Other'];
const PERIODS=['Q1','Q2','Q3','Q4','Full Year'];
const REVIEW_PDS=['Mid-Year','Annual','Both'];
const ROLE_TYPES=['Lead Agent','Supporting Agent','Case Agent'];

let cases=[
  {id:1,type:'case',name:'Op. Tarnished Shield',caseNum:'2024-PC-0041',violation:'Public Corruption',status:'Active',priority:'High',role:'Lead Agent',quarter:'Q1',reviewPd:'Annual',supervisor:'SSRA Martinez',ausa:'AUSA Chen, SDNY',description:'Investigating sitting municipal official for accepting bribes from infrastructure contractors. Multi-subject, multi-count investigation.',outcomes:[],impact:'Executed 3 consensual recordings; identified 2 additional subjects; case presented to grand jury Q2. Approx. $2.1M in corrupt payments documented.',evidence:'CMS Entry #2024-PC-0041; GJ subpoena log',feedback:'AUSA Chen noted "one of the most methodical CW development packages I\'ve reviewed." — Q2 check-in',competencies:['Investigation','Legal/Court','Source Development','Intelligence Analysis'],monetaryImpact:'$2,100,000',arrests:0,convictions:0},
  {id:2,type:'case',name:'Horizon Financial Fraud',caseNum:'2024-FF-0089',violation:'Financial Fraud/Wire',status:'Closed — Conviction',priority:'High',role:'Lead Agent',quarter:'Q1',reviewPd:'Annual',supervisor:'SSRA Martinez',ausa:'AUSA Patel, DOJ Fraud',description:'Two-defendant wire fraud scheme targeting elderly investors via fictitious hedge fund. $4.7M in losses.',outcomes:['Arrest','Indictment','Conviction'],impact:'Both defendants convicted after 3-week trial. Restitution order of $4.7M. Sentenced to 84 and 60 months respectively. Case received national press coverage.',evidence:'USDC Case 24-CR-0412',feedback:'"Your trial prep was exceptional — the jury understood complex financial evidence because of how you organized the exhibits." — AUSA Patel, post-verdict',competencies:['Investigation','Legal/Court','Financial Analysis','Written Communication','Verbal Briefing'],monetaryImpact:'$4,700,000',arrests:2,convictions:2},
  {id:3,type:'case',name:'Shadownet Ransomware Cell',caseNum:'2024-CY-0017',violation:'Cybercrime',status:'Pending Review',priority:'High',role:'Supporting Agent',quarter:'Q2',reviewPd:'Annual',supervisor:'SSRA Martinez',ausa:'AUSA Nguyen, CCIPS',description:'International ransomware group targeting US hospital systems. Joint investigation with FBI Cyber Division and CISA.',outcomes:['Arrest','Indictment'],impact:'Supported execution of MLATs with 3 partner countries; assisted in server seizure valued at est. $900K in crypto. 1 defendant extradited, awaiting trial.',evidence:'INTERPOL Op. Ref. #IC-2024-338',feedback:'',competencies:['Investigation','Digital/Cyber','Interagency Coordination','Intelligence Analysis'],monetaryImpact:'$900,000',arrests:1,convictions:0},
  {id:4,type:'case',name:'Gulf Coast DEA Task Force',caseNum:'2024-DT-0055',violation:'Drug Trafficking',status:'Active',priority:'Medium',role:'Supporting Agent',quarter:'Q3',reviewPd:'Annual',supervisor:'SSRA Washington',ausa:'AUSA Torres, SDTX',description:'Multi-agency task force targeting fentanyl distribution network. Assigned as office liaison.',outcomes:[],impact:'Provided 6 deconfliction reports; attended 4 joint operational planning sessions; authored intelligence assessment distributed to 3 partner agencies.',evidence:'TF Op Log Q3-2024',feedback:'TF Coordinator noted reliability and thoroughness of deconfliction submissions.',competencies:['Investigation','Interagency Coordination','Intelligence Analysis','Written Communication'],monetaryImpact:'',arrests:0,convictions:0},
  {id:5,type:'case',name:'Op. False Flag',caseNum:'2024-CC-0003',violation:'Public Corruption',status:'Closed — Conviction',priority:'High',role:'Lead Agent',quarter:'Q2',reviewPd:'Both',supervisor:'SSRA Martinez',ausa:'AUSA Reed',description:'Undercover operation targeting county procurement official soliciting kickbacks. Solo-managed from opening to sentencing.',outcomes:['Arrest','Conviction'],impact:'Defendant pleaded guilty, sentenced to 36 months. $340K in ill-gotten gains forfeited. Obtained 14 consensually recorded meetings over 8 months.',evidence:'USDC Case 24-CR-0188',feedback:'"Flawlessly handled a complex undercover assignment — your judgment and documentation were exemplary." — SSRA Martinez, mid-year review',competencies:['Investigation','Source Development','Legal/Court','Surveillance','Written Communication'],monetaryImpact:'$340,000',arrests:1,convictions:1},
];

let initiatives=[
  {id:10,type:'initiative',name:'New Agent Mentorship Program',itype:'Collateral Duty',status:'Ongoing',quarter:'Q1',reviewPd:'Annual',supervisor:'SSRA Martinez',description:'Serving as assigned mentor for 2 new agents in initial field assignment. Conduct bi-weekly check-ins, review case documents, provide operational feedback.',impact:'Mentored 2 incoming agents through first 6 months. Both rated "exceeds expectations" at 6-month evaluation.',competencies:['Leadership','Verbal Briefing','Written Communication'],feedback:'"One of our strongest mentors — new agents consistently cite you as a reason they feel supported." — SSRA Martinez'},
  {id:11,type:'initiative',name:'Office Interview Training',itype:'Training Delivery',status:'Completed',quarter:'Q2',reviewPd:'Mid-Year',supervisor:'SSRA Washington',description:'Developed and delivered 3-hour interview techniques training for 18 field agents. Created scenario-based curriculum from scratch.',impact:'18 agents trained. Post-training survey: 94% rated it "highly useful." Curriculum adopted as standard for all incoming agents.',competencies:['Verbal Briefing','Written Communication','Leadership'],feedback:''},
  {id:12,type:'initiative',name:'HIDTA Task Force Liaison',itype:'Task Force Participation',status:'Active',quarter:'Q3',reviewPd:'Annual',supervisor:'SSRA Washington',description:'Serving as office representative on regional HIDTA task force. Attend monthly coordination meetings and manage deconfliction requests.',impact:'Represented office in 9 TF meetings; resolved 4 deconfliction conflicts preventing operational overlap with DEA and local PD.',competencies:['Interagency Coordination','Intelligence Analysis'],feedback:''},
];

let feedbackItems=[
  {id:20,type:'feedback',date:'2024-03-15',source:'SSRA Martinez',ftype:'Supervisor Commendation',quarter:'Q1',reviewPd:'Mid-Year',text:'Outstanding work on the Horizon Financial Fraud case. Your ability to distill complex financial evidence for a lay jury was a primary factor in the conviction. This is exactly the kind of excellence we expect from lead agents.',competencies:['Financial Analysis','Legal/Court','Written Communication']},
  {id:21,type:'feedback',date:'2024-06-28',source:'AUSA Patel (DOJ Fraud Section)',ftype:'AUSA Feedback',quarter:'Q2',reviewPd:'Mid-Year',text:'Your trial prep was exceptional — the jury understood complex financial evidence because of how you organized the exhibits. I look forward to working on future cases together.',competencies:['Legal/Court','Written Communication','Verbal Briefing']},
  {id:22,type:'feedback',date:'2024-08-10',source:'SSRA Martinez',ftype:'Annual Review Note',quarter:'Q3',reviewPd:'Annual',text:'Flawlessly handled a complex undercover assignment. Judgment under pressure, documentation discipline, and calm demeanor throughout Op. False Flag were exemplary. Recommended for advanced undercover certification.',competencies:['Investigation','Source Development','Surveillance']},
  {id:23,type:'feedback',date:'2024-09-05',source:'TF Coordinator, HIDTA',ftype:'Task Force Partner',quarter:'Q3',reviewPd:'Annual',text:'Your deconfliction work has been thorough and timely. The interagency reporting you produce sets the standard we\'d like to see from all participating agencies.',competencies:['Interagency Coordination','Intelligence Analysis','Written Communication']},
];

let nextId=30;
let editingId=null;
let activeTab='overview';
let caseFilterStatus='',caseFilterQ='',caseFilterPriority='',caseFilterRole='';
let initFilterStatus='',initFilterQ='';

const ALL_RECORDS=()=>[...cases,...initiatives,...feedbackItems];

function statusBadge(s){
  const m={'Active':'b-active','Closed — Conviction':'b-closed','Closed — Declined':'b-blocked','Pending Review':'b-pending','Inactive':'b-inactive','Completed':'b-closed','Ongoing':'b-active'};
  return `<span class="badge ${m[s]||'b-inactive'}">${s}</span>`;
}
function priBadge(p){const m={High:'b-high',Medium:'b-med',Low:'b-low'};return `<span class="badge ${m[p]||'b-low'}">${p}</span>`;}
function typeBadge(t){const m={case:'b-case',initiative:'b-initiative',feedback:'b-feedback',training:'b-training'};const lbl={case:'Case',initiative:'Initiative',feedback:'Feedback',training:'Training'};return `<span class="badge ${m[t]||'b-inactive'}">${lbl[t]||t}</span>`;}
function roleBadge(r){return r==='Lead Agent'?`<span class="badge b-lead">${r}</span>`:`<span class="badge b-support">${r}</span>`;}
function outcomeBadges(arr){if(!arr||!arr.length)return '<span style="color:#9CA3AF;font-size:11px">Pending</span>';return arr.map(o=>{const cls={Arrest:'ob-arrest',Indictment:'ob-indictment',Conviction:'ob-conviction','Asset Seizure':'ob-seizure'}[o]||'ob-none';return `<span class="outcome-badge ${cls}">${o}</span>`;}).join('');}
function missingImpact(){return [...cases,...initiatives].filter(r=>r.status&&(r.status==='Closed — Conviction'||r.status==='Completed')&&!r.impact.trim());}

function renderOverview(){
  const totalCases=cases.length;
  const activeCases=cases.filter(c=>c.status==='Active').length;
  const closedConviction=cases.filter(c=>c.status==='Closed — Conviction').length;
  const totalArrests=cases.reduce((a,c)=>a+(c.arrests||0),0);
  const totalConvictions=cases.reduce((a,c)=>a+(c.convictions||0),0);
  const totalMoney=cases.reduce((a,c)=>a+(parseFloat((c.monetaryImpact||'').replace(/[^0-9.]/g,''))||0),0);
  const leadCases=cases.filter(c=>c.role==='Lead Agent').length;
  const initCount=initiatives.length;
  const miss=missingImpact();

  const compTally={};
  [...cases,...initiatives,...feedbackItems].forEach(r=>(r.competencies||[]).forEach(c=>compTally[c]=(compTally[c]||0)+1));
  const topComps=Object.entries(compTally).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxComp=topComps[0]?topComps[0][1]:1;

  const qCases={Q1:0,Q2:0,Q3:0,Q4:0};
  cases.forEach(c=>{if(qCases[c.quarter]!==undefined)qCases[c.quarter]++;});

  const compColors={'Investigation':'#185FA5','Legal/Court':'#1B6B3A','Written Communication':'#534AB7','Leadership':'#B45309','Interagency Coordination':'#0F6E56','Financial Analysis':'#B8860B','Source Development':'#8B4513','Digital/Cyber':'#1D6FA4'};

  let alertHtml='';
  if(miss.length)alertHtml=`<div class="alert"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span><strong>${miss.length} closed matter${miss.length>1?'s':''}</strong> missing a documented outcome/impact statement. <a href="#" onclick="showTab('review');return false;" style="color:#78350F;font-weight:600">View in Review Doc →</a></span></div>`;

  document.getElementById('tab-overview').innerHTML=`
${alertHtml}
<div class="stat-grid">
  <div class="stat"><div class="lbl">Total Cases</div><div class="num">${totalCases}</div></div>
  <div class="stat gold"><div class="lbl">Active Cases</div><div class="num" style="color:var(--gold)">${activeCases}</div></div>
  <div class="stat green"><div class="lbl">Convictions</div><div class="num">${totalConvictions}</div></div>

function renderReview(){
  const miss=missingImpact();
  let alertHtml='';
  if(miss.length)alertHtml=`<div class="alert"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span><strong>${miss.length} closed matter${miss.length>1?'s':''}</strong> have no impact statement. Click the orange warning on each card to add one now.</span></div>`;

  const closedCases=cases.filter(c=>c.status==='Closed — Conviction'||c.status==='Closed — Declined');
  const completedInits=initiatives.filter(i=>i.status==='Completed');

  const caseCards=closedCases.map(c=>`<div class="review-card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px">
      <div class="rc-title">${c.name}</div>
      <div style="display:flex;gap:5px;flex-shrink:0">${roleBadge(c.role)}</div>
    </div>
    <div style="font-size:11px;color:#64748B;margin-bottom:10px">${c.caseNum} &middot; ${c.violation} &middot; ${c.quarter} &middot; ${c.reviewPd} &middot; AUSA: ${c.ausa||'—'}</div>
    ${c.impact?`<div class="rc-impact">${c.impact}</div>`:''}
    ${c.feedback?`<div class="rc-quote">"${c.feedback}"</div>`:''}
    ${!c.impact?`<div class="rc-warn" onclick="openEdit(${c.id})">No impact statement — click to document outcomes (use specific numbers: arrests, sentences, $ forfeited, $ in loss)</div>`:''}
    <div class="rc-tags">
      <span class="rc-tag" style="background:#185FA5;color:#BFDBFE">${c.violation}</span>
      ${outcomeBadges(c.outcomes)}
      ${(c.competencies||[]).map(s=>`<span class="rc-tag">${s}</span>`).join('')}
    </div>
  </div>`).join('');

  const initCards=completedInits.map(i=>`<div class="review-card">
    <div class="rc-title" style="margin-bottom:6px">${i.name}</div>
    <div style="font-size:11px;color:#64748B;margin-bottom:10px">${i.itype} &middot; ${i.quarter} &middot; ${i.reviewPd}</div>
    ${i.impact?`<div class="rc-impact">${i.impact}</div>`:''}
    ${i.feedback?`<div class="rc-quote">"${i.feedback}"</div>`:''}
    ${!i.impact?`<div class="rc-warn" onclick="openEdit(${i.id})">No impact statement — click to document what you delivered and who it served.</div>`:''}
    <div class="rc-tags">${(i.competencies||[]).map(s=>`<span class="rc-tag">${s}</span>`).join('')}</div>
  </div>`).join('');

  const fCards=feedbackItems.map(f=>`<div style="background:#0F172A;border-left:3px solid var(--gold-bd);border-radius:0 8px 8px 0;padding:16px 18px;cursor:pointer" onclick="openEdit(${f.id})">
    <div style="font-size:11px;color:#64748B;margin-bottom:6px">${f.ftype} — <strong style="color:#94A3B8">${f.source}</strong> &middot; ${f.date} &middot; ${f.quarter}</div>
    <div style="font-size:13px;color:#CBD5E1;font-style:italic;line-height:1.6">"${f.text}"</div>
    <div class="rc-tags" style="margin-top:10px">${(f.competencies||[]).map(s=>`<span class="rc-tag">${s}</span>`).join('')}</div>
  </div>`).join('');

  document.getElementById('tab-review').innerHTML=`
${alertHtml}
${closedCases.length?`<div class="sec-hdr">Closed Cases — Review-Ready</div><div class="review-grid" style="margin-bottom:20px">${caseCards}</div>`:''}
${completedInits.length?`<div class="sec-hdr" style="margin-top:8px">Completed Initiatives</div><div class="review-grid" style="margin-bottom:20px">${initCards}</div>`:''}
<div class="sec-hdr" style="margin-top:8px">Feedback &amp; Commendations</div>
<div style="display:grid;grid-template-columns:1fr;gap:12px;margin-top:14px">${fCards||'<div style="color:#9CA3AF;font-size:13px;padding:20px">No feedback logged yet.</div>'}</div>`;
}

function showTab(t){
  activeTab=t;
  ['overview','cases','initiatives','feedback','review'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===t?'block':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['overview','cases','initiatives','feedback','review'][i]===t);
  });
}

function openEdit(id){
  editingId=id;
  const r=ALL_RECORDS().find(x=>x.id===id);
  if(!r)return;
  if(r.type==='case'){openCaseModal(r);}
  else if(r.type==='initiative'){openInitModal(r);}
  else if(r.type==='feedback'){openFeedbackModal(r);}
}
function openAddCase(){editingId=null;openCaseModal({});}
function openAddInit(){editingId=null;openInitModal({});}
function openAddFeedback(){editingId=null;openFeedbackModal({});}

function ta(fld,val,ph=''){return `<textarea id="f-${fld}" placeholder="${ph}">${val||''}</textarea>`;}

  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Case name is required.');return;}
  const d={type:'case',name,caseNum:document.getElementById('f-caseNum').value,violation:document.getElementById('f-violation').value,status:document.getElementById('f-status').value,priority:document.getElementById('f-priority').value,role:document.getElementById('f-role').value,quarter:document.getElementById('f-quarter').value,reviewPd:document.getElementById('f-reviewPd').value,supervisor:document.getElementById('f-supervisor').value,ausa:document.getElementById('f-ausa').value,description:document.getElementById('f-description').value,impact:document.getElementById('f-impact').value,outcomes:[...document.querySelectorAll('.outcome-check:checked')].map(i=>i.value),monetaryImpact:document.getElementById('f-monetaryImpact').value,evidence:document.getElementById('f-evidence').value,arrests:parseInt(document.getElementById('f-arrests').value)||0,convictions:parseInt(document.getElementById('f-convictions').value)||0,feedback:document.getElementById('f-feedback').value,competencies:getSkills()};
  if(editingId){const idx=cases.findIndex(x=>x.id===editingId);cases[idx]={...cases[idx],...d};}
  else{cases.push({id:nextId++,...d});}
  closeModal();renderAll();
}

function saveInit(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Title is required.');return;}
  const d={type:'initiative',name,itype:document.getElementById('f-itype').value,status:document.getElementById('f-status').value,quarter:document.getElementById('f-quarter').value,reviewPd:document.getElementById('f-reviewPd').value,supervisor:document.getElementById('f-supervisor').value,description:document.getElementById('f-description').value,impact:document.getElementById('f-impact').value,feedback:document.getElementById('f-feedback').value,competencies:getSkills()};
  if(editingId){const idx=initiatives.findIndex(x=>x.id===editingId);initiatives[idx]={...initiatives[idx],...d};}
  else{initiatives.push({id:nextId++,...d});}
  closeModal();renderAll();
}

function saveFeedback(){
  const text=document.getElementById('f-text').value.trim();
  if(!text){alert('Feedback content is required.');return;}
  const d={type:'feedback',source:document.getElementById('f-source').value,ftype:document.getElementById('f-ftype').value,date:document.getElementById('f-date').value,quarter:document.getElementById('f-quarter').value,reviewPd:document.getElementById('f-reviewPd').value,text,competencies:getSkills()};
  if(editingId){const idx=feedbackItems.findIndex(x=>x.id===editingId);feedbackItems[idx]={...feedbackItems[idx],...d};}
  else{feedbackItems.push({id:nextId++,...d});}
  closeModal();renderAll();
}

function deleteRecord(id){
  if(!confirm('Delete this record?'))return;
  cases=cases.filter(x=>x.id!==id);
  initiatives=initiatives.filter(x=>x.id!==id);
  feedbackItems=feedbackItems.filter(x=>x.id!==id);
  closeModal();renderAll();
}

renderAll();
showTab('overview');
</script>
</body>
